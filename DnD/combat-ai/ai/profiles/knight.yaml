# Knight AI Profile
# INT 11 → Cunning tier
# Disciplined fighter who follows orders and protects allies.

creature_type: knight
personality: "disciplined, honorable, protects allies and holds formation"
preferred_tactics:
  - protect_allies
  - hold_formation
